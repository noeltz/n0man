run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert
    - unparam
    - gocritic
    - gocyclo
    - gochecknoinits
    - goconst
    - gocognit
    - prealloc

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true
  gocyclo:
    min-complexity: 15
  gocognit:
    min-complexity: 15
  govet:
    enable-all: true
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/noeltz/n0man
  misspell:
    locale: US
  unparam:
    check-exported: true
  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - gocognit
        - goconst
        - gochecknoinits
    - path: integration_test\.go
      linters:
        - gocyclo
        - gocognit
    - linters:
        - gocritic
      text: "unnecessaryTernaryOp"

severity:
  default-severity: warning
  case-sensitive: false
  rules:
    - severity: error
      linters:
        - errcheck
        - govet
    - severity: warning
      linters:
        - gocyclo
        - gocognit
        - gochecknoinits
